version: '3.9'
services:
  email-pdf-extractor:
    build: .
    container_name: email-pdf-extractor
    ports:
      - "5001:5000"
    volumes:
      - ./data:/app/data
    environment:
      - FLASK_ENV=production
      - DATABASE_URL=sqlite:///data/app.db
      - IMAP_HOST
      - IMAP_PORT=993
      - IMAP_USER
      - IMAP_PASS
      - IMAP_FOLDER=INBOX
      - POLL_INTERVAL=120
      - ONEDRIVE_TENANT_ID
      - ONEDRIVE_CLIENT_ID
      - ONEDRIVE_CLIENT_SECRET
      - ONEDRIVE_REFRESH_TOKEN
      - ONEDRIVE_FOLDER_PATH=/Documents/Invoices
      - SECRET_KEY=replace-this-with-a-secure-value
      - UI_USER=admin
      - UI_PASSWORD
      - LOG_RETENTION_DAYS=30
    restart: unless-stopped
