version: '3.9'
services:
  email-pdf-extractor:
    image: ghcr.io/ghmeister/email-pdf-extractor:latest
    container_name: email-pdf-extractor
    ports:
      - "5001:5000"
    volumes:
      - email_pdf_data:/app/data
    environment:
      - FLASK_ENV=production
      - DATABASE_URL=sqlite:////app/data/app.db
      - IMAP_HOST
      - IMAP_PORT=993
      - IMAP_USER
      - IMAP_PASS
      - IMAP_FOLDER=INBOX
      - POLL_INTERVAL=120
      - ONEDRIVE_CLIENT_ID
      - ONEDRIVE_FOLDER_PATH=/Documents/Invoices
      - TOKEN_CACHE_PATH=/app/data/.token_cache.json
      - SECRET_KEY=replace-this-with-a-secure-value
      - UI_USER=admin
      - UI_PASSWORD
      - LOG_RETENTION_DAYS=30
    restart: unless-stopped

volumes:
  email_pdf_data:
